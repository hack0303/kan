name: Publish @hack0303/kan-mcp

on:
  push:
    tags: ["mcp-v*.*.*"]
    paths: ["packages/mcp/**"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.1)"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm --filter @hack0303/kan-mcp build

      - name: Bump version (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          cd packages/mcp
          pnpm version ${{ github.event.inputs.version }} --no-git-tag-version
        env:
          npm_config_yes: true

      - name: Publish to npm
        run: |
          cd packages/mcp
          pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
